<!DOCTYPE html>
<html>
<head>
    <title>Excel Data Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Excel Data Dashboard</h1>
    </header>

    <section class="cards">

        <div class="card">
            <h2>Persons</h2>
            <div class="table-container">
                <table id="personsTable"></table>
            </div>
        </div>

        <div class="card">
            <h2>Products</h2>
            <div class="table-container">
                <table id="productsTable"></table>
            </div>
        </div>

        <div class="card">
            <h2>Orders</h2>
            <div class="table-container">
                <table id="ordersTable"></table>
            </div>
        </div>

    </section>

</div>

<!-- XLSX Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
